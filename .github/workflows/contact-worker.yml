name: Deploy Contact API Worker

on:
  push:
    branches: ['main']
    paths:
      - '.github/workflows/contact-worker.yml'
      - 'infrastructure/cloudflare/contact-worker/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare deployment secrets
        env:
          HAS_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          HAS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
          HAS_CONTACT_LOGS_KV_ID: ${{ secrets.CONTACT_LOGS_KV_ID != '' }}
          HAS_CONTACT_RATE_LIMITS_KV_ID: ${{ secrets.CONTACT_RATE_LIMITS_KV_ID != '' }}
          HAS_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' }}
        run: |
          if [ "$HAS_CLOUDFLARE_API_TOKEN" != "true" ] || [ "$HAS_CLOUDFLARE_ACCOUNT_ID" != "true" ]; then
            echo "::error::Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets before deploying the contact Worker."
            exit 1
          fi
          if [ "$HAS_CONTACT_LOGS_KV_ID" != "true" ] || [ "$HAS_CONTACT_RATE_LIMITS_KV_ID" != "true" ]; then
            echo "::error::Set CONTACT_LOGS_KV_ID and CONTACT_RATE_LIMITS_KV_ID repository secrets before deploying the contact Worker."
            exit 1
          fi
          if [ "$HAS_RESEND_API_KEY" != "true" ]; then
            echo "::error::Set RESEND_API_KEY repository secret before deploying the contact Worker."
            exit 1
          fi

      - name: Materialize Worker KV bindings
        working-directory: infrastructure/cloudflare/contact-worker
        env:
          CONTACT_LOGS_KV_ID: ${{ secrets.CONTACT_LOGS_KV_ID }}
          CONTACT_RATE_LIMITS_KV_ID: ${{ secrets.CONTACT_RATE_LIMITS_KV_ID }}
        run: |
          perl -0pi -e 's/__CONTACT_LOGS_KV_ID__/$ENV{CONTACT_LOGS_KV_ID}/g; s/__CONTACT_RATE_LIMITS_KV_ID__/$ENV{CONTACT_RATE_LIMITS_KV_ID}/g' wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: infrastructure/cloudflare/contact-worker
          secrets: |
            RESEND_API_KEY
