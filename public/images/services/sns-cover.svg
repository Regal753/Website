<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SNS operations dashboard illustration</title>
  <desc id="desc">A custom editorial dashboard with KPI cards, a content calendar, and a publish queue.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff1f2" />
      <stop offset="55%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eff6ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#f8fafc" />
  <rect width="1600" height="900" fill="url(#bg)" />
  <g filter="url(#shadow)">
    <rect x="76" y="72" width="1448" height="756" rx="42" fill="#ffffff" />
  </g>
  <rect x="124" y="126" width="214" height="34" rx="17" fill="#ffe4e6" />
  <text x="148" y="149" fill="#be123c" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">SNS management</text>
  <text x="124" y="210" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="54" font-weight="700">Editorial system that keeps moving</text>
  <text x="124" y="252" fill="#475569" font-family="Segoe UI, sans-serif" font-size="24">Calendar, KPI review, publish queue, and feedback loop in one view.</text>

  <rect x="124" y="308" width="272" height="126" rx="28" fill="#fff1f2" stroke="#fecdd3" />
  <text x="154" y="350" fill="#9f1239" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700">Weekly KPI</text>
  <text x="154" y="398" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="50" font-weight="700">+28%</text>
  <text x="286" y="398" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="22">retention</text>

  <rect x="428" y="308" width="502" height="368" rx="32" fill="#ffffff" stroke="#e2e8f0" />
  <text x="464" y="354" fill="#334155" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Content calendar</text>
  <rect x="464" y="388" width="430" height="18" rx="9" fill="#f1f5f9" />
  <rect x="464" y="432" width="120" height="204" rx="24" fill="#ffe4e6" />
  <rect x="604" y="432" width="120" height="204" rx="24" fill="#fce7f3" />
  <rect x="744" y="432" width="150" height="204" rx="24" fill="#e0f2fe" />
  <rect x="488" y="458" width="72" height="72" rx="18" fill="#ffffff" />
  <rect x="628" y="458" width="72" height="72" rx="18" fill="#ffffff" />
  <rect x="768" y="458" width="102" height="16" rx="8" fill="#ffffff" opacity="0.9" />
  <rect x="768" y="492" width="102" height="16" rx="8" fill="#ffffff" opacity="0.9" />
  <rect x="768" y="526" width="102" height="16" rx="8" fill="#ffffff" opacity="0.9" />
  <rect x="768" y="566" width="86" height="34" rx="17" fill="#0f172a" opacity="0.9" />

  <rect x="962" y="308" width="438" height="170" rx="32" fill="#fff7ed" stroke="#fed7aa" />
  <text x="996" y="354" fill="#9a3412" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Publish queue</text>
  <rect x="996" y="388" width="370" height="22" rx="11" fill="#ffffff" />
  <rect x="996" y="426" width="310" height="22" rx="11" fill="#ffffff" />
  <rect x="1318" y="424" width="48" height="26" rx="13" fill="#fb7185" />

  <rect x="962" y="506" width="438" height="170" rx="32" fill="#eff6ff" stroke="#bfdbfe" />
  <text x="996" y="552" fill="#1d4ed8" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Feedback loop</text>
  <path d="M1010 628 C1080 564, 1150 650, 1218 592 S1348 564, 1364 610" fill="none" stroke="#2563eb" stroke-width="12" stroke-linecap="round" />
  <circle cx="1218" cy="592" r="12" fill="#f43f5e" />
  <circle cx="1364" cy="610" r="12" fill="#2563eb" />
</svg>
