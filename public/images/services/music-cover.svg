  <rect x="682" y="390" width="276" height="18" rx="9" fill="#e2e8f0" />
  <rect x="682" y="434" width="276" height="18" rx="9" fill="#e2e8f0" />
  <rect x="682" y="478" width="220" height="18" rx="9" fill="#e2e8f0" />
  <rect x="682" y="510" width="138" height="30" rx="15" fill="#fef3c7" />

  <rect x="1028" y="312" width="372" height="170" rx="32" fill="#eff6ff" stroke="#bfdbfe" />
  <text x="1062" y="358" fill="#1d4ed8" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Split and ownership</text>
