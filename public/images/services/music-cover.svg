  <text x="128" y="210" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="54" font-weight="700">Rights, catalogs, and usage handled cleanly</text>
  <text x="128" y="252" fill="#475569" font-family="Segoe UI, sans-serif" font-size="24">Less studio mood, more ledger, claim handling, and contract visibility.</text>

