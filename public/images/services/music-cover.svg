  <rect x="164" y="438" width="414" height="32" rx="16" fill="#ffffff" />
  <rect x="164" y="488" width="414" height="32" rx="16" fill="#ffffff" />
  <rect x="164" y="538" width="414" height="32" rx="16" fill="#ffffff" />
  <rect x="164" y="588" width="414" height="32" rx="16" fill="#ffffff" />
  <rect x="468" y="446" width="84" height="16" rx="8" fill="#f59e0b" />
  <rect x="468" y="496" width="84" height="16" rx="8" fill="#84cc16" />
  <rect x="468" y="546" width="84" height="16" rx="8" fill="#60a5fa" />
  <rect x="468" y="596" width="84" height="16" rx="8" fill="#fb7185" />

