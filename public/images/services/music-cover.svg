<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Music rights operations illustration</title>
  <desc id="desc">A rights-led visual with a cue sheet, rights ledger, split notes, and claim workflow panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="55%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="84" y="76" width="1432" height="748" rx="42" fill="#ffffff" stroke="#f3e8c8" />
